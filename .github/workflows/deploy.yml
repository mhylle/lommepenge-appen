name: Deploy App2 to mhylle.com

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE_NAME: ${{ github.repository }}-frontend
  BACKEND_IMAGE_NAME: ${{ github.repository }}-backend
  APP_NAME: lommepenge

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Validate Dockerfile syntax
      run: |
        docker build -f frontend/Dockerfile --target build . --quiet || echo "Frontend Dockerfile needs adjustment"
        docker build -f backend/Dockerfile --target builder . --quiet || echo "Backend Dockerfile needs adjustment"

  build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    outputs:
      frontend-image: ${{ steps.meta-frontend.outputs.tags }}
      backend-image: ${{ steps.meta-backend.outputs.tags }}
      frontend-digest: ${{ steps.build-frontend.outputs.digest }}
      backend-digest: ${{ steps.build-backend.outputs.digest }}
      version: ${{ steps.version.outputs.version }}

    steps:
    - name: Free up disk space
      run: |
        echo "🧹 Freeing up disk space..."
        docker system prune -af --volumes || true
        sudo rm -rf /opt/ghc /usr/share/dotnet || true
    
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Generate version
      id: version
      run: |
        if [[ ${{ github.ref }} == 'refs/heads/main' ]]; then
          VERSION="v$(date +%Y%m%d)-$(echo ${{ github.sha }} | cut -c1-7)"
        else
          VERSION="pr-${{ github.event.number }}-$(echo ${{ github.sha }} | cut -c1-7)"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Generated version: $VERSION"

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Build Frontend
    - name: Extract frontend metadata
      id: meta-frontend
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=raw,value=latest,enable={{is_default_branch}}
          type=raw,value=${{ steps.version.outputs.version }}

    - name: Build and push frontend image
      id: build-frontend
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./frontend/Dockerfile
        platforms: ${{ github.ref == 'refs/heads/main' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
        push: true
        tags: ${{ steps.meta-frontend.outputs.tags }}
        labels: ${{ steps.meta-frontend.outputs.labels }}
        build-args: |
          BASE_HREF=/lommepenge/
          DEPLOY_URL=/lommepenge/
        cache-from: type=gha
        cache-to: type=gha,mode=max

    # Build Backend
    - name: Extract backend metadata
      id: meta-backend
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=raw,value=latest,enable={{is_default_branch}}
          type=raw,value=${{ steps.version.outputs.version }}

    - name: Build and push backend image
      id: build-backend
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./backend/Dockerfile
        platforms: ${{ github.ref == 'refs/heads/main' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
        push: true
        tags: ${{ steps.meta-backend.outputs.tags }}
        labels: ${{ steps.meta-backend.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
    - name: Deploy to Scaleway
      uses: appleboy/ssh-action@v1.0.0
      env:
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        envs: JWT_SECRET
        script: |
          set -e

          echo "🚀 Starting deployment of ${{ env.APP_NAME }}..."

          # Navigate to infrastructure directory
          cd /home/mhylle/projects/mhylle.com
          
          # Source environment variables
          source .env
          
          # Log deployment start
          echo "📝 Logging deployment..."
          docker exec mhylle-postgres psql -U $POSTGRES_USER -d $POSTGRES_DB -c "
            INSERT INTO deployment_logs (
              app_name, deployment_id, status, frontend_image, backend_image, 
              version, deployed_by, metadata
            ) VALUES (
              '${{ env.APP_NAME }}', 
              'gh-${{ github.run_id }}', 
              'started', 
              '${{ needs.build.outputs.frontend-image }}',
              '${{ needs.build.outputs.backend-image }}',
              '${{ needs.build.outputs.version }}',
              '${{ github.actor }}',
              '{\"github_run_id\": \"${{ github.run_id }}\", \"commit_sha\": \"${{ github.sha }}\"}'
            );
          " || echo "Warning: Failed to log deployment start"
          
          # Run deployment using docker-compose
          FRONTEND_FULL=$(echo "${{ needs.build.outputs.frontend-image }}" | head -n1)
          BACKEND_FULL=$(echo "${{ needs.build.outputs.backend-image }}" | head -n1)
          
          # Extract base image name (remove tag)
          FRONTEND_IMAGE=${FRONTEND_FULL%:*}
          BACKEND_IMAGE=${BACKEND_FULL%:*}
          
          echo "Frontend image: $FRONTEND_IMAGE"
          echo "Backend image: $BACKEND_IMAGE"
          echo "Version: ${{ needs.build.outputs.version }}"
          
          # Log in to GitHub Container Registry
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # Update nginx config to route /lommepenge/ and /api/lommepenge/
          echo "🔧 Updating nginx configuration for /lommepenge/ routes..."
          NGINX_CONF="/tmp/nginx-conf.d/apps.conf"
          if [ -f "$NGINX_CONF" ]; then
            # Add /lommepenge/ routes if not already present
            if ! grep -q "location /lommepenge/" "$NGINX_CONF"; then
              cat >> "$NGINX_CONF" << 'NGINX_EOF'

          # Lommepenge App (formerly app2)
          location /lommepenge/ {
              proxy_pass http://app2-frontend:80/lommepenge/;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
          }

          location /api/lommepenge/ {
              rewrite ^/api/lommepenge/(.*)$ /$1 break;
              proxy_pass http://app2-backend:3000;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
          }
          NGINX_EOF
              echo "✅ Added /lommepenge/ routes to nginx config"
            else
              echo "✅ /lommepenge/ routes already in nginx config"
            fi
            # Reload nginx
            docker exec mhylle-nginx nginx -s reload 2>/dev/null || echo "⚠️ Could not reload nginx (may need manual reload)"
          else
            echo "⚠️ Nginx config not found at $NGINX_CONF - routes need manual setup"
          fi

          # Deploy App2 independently using Docker directly
          echo "🚀 Deploying App2 using Docker containers..."

          # Extract version for cleanup
          VERSION="${{ needs.build.outputs.version }}"

          # Clean up Docker resources before deployment
          echo "🧹 Cleaning up Docker resources..."

          # Remove dangling images (untagged)
          docker image prune -f || echo "No dangling images to remove"

          # Remove unused images older than 24 hours
          docker image prune -a --filter "until=24h" -f || echo "No old images to remove"

          # Remove stopped containers
          docker container prune -f || echo "No stopped containers to remove"

          # Display disk usage before pull
          echo "📊 Disk usage before pull:"
          df -h / || true
          docker system df || true

          # Pull latest images
          docker pull "$FRONTEND_FULL"
          docker pull "$BACKEND_FULL"
          
          # Stop and remove existing App2 containers only (app independence)
          echo "🛑 Stopping existing App2 containers only..."
          docker stop app2-frontend app2-backend 2>/dev/null || echo "No existing App2 containers to stop"
          docker rm app2-frontend app2-backend 2>/dev/null || echo "No existing App2 containers to remove"
          
          # Verify App2 is still running (critical independence check)
          echo "🔍 Verifying App2 independence..."
          if docker ps | grep -E "app2-(frontend|backend)"; then
            echo "✅ App2 containers still running - independence maintained"
          else
            echo "ℹ️ App2 containers not found (may not be deployed yet)"
          fi
          
          # Start App2 backend with database connection
          echo "🚀 Starting App2 backend..."
          docker run -d \
            --name app2-backend \
            --restart unless-stopped \
            --network mhylle_app-network \
            -p 8002:3000 \
            -e NODE_ENV=production \
            -e DB_HOST=mhylle-postgres \
            -e DB_PORT=5432 \
            -e DB_NAME=mhylle_app2 \
            -e DB_USER=app2_user \
            -e DB_PASSWORD="${APP2_DB_PASSWORD}" \
            -e JWT_SECRET="${JWT_SECRET}" \
            -e USE_PRODUCTION_AUTH=true \
            -e API_PREFIX=/api/lommepenge \
            --health-cmd="curl -f http://localhost:3000/health || exit 1" \
            --health-interval=30s \
            --health-timeout=10s \
            --health-retries=3 \
            --health-start-period=40s \
            "$BACKEND_FULL"
          
          # Start App2 frontend
          echo "🚀 Starting App2 frontend..."
          docker run -d \
            --name app2-frontend \
            --restart unless-stopped \
            --network mhylle_app-network \
            -p 3002:80 \
            -e NODE_ENV=production \
            --health-cmd="curl -f http://localhost:80/ || exit 1" \
            --health-interval=30s \
            --health-timeout=10s \
            --health-retries=3 \
            --health-start-period=30s \
            "$FRONTEND_FULL"
          
          # Wait for containers to be healthy
          echo "⏳ Waiting for App2 containers to be healthy..."
          echo "Waiting 45s for health-start-period..."
          sleep 45

          # Poll until healthy or timeout after 90s
          TRIES=0
          MAX_TRIES=18
          while [ $TRIES -lt $MAX_TRIES ]; do
            BACKEND_HEALTH=$(docker inspect --format="{{.State.Health.Status}}" app2-backend 2>/dev/null || echo "unknown")
            FRONTEND_HEALTH=$(docker inspect --format="{{.State.Health.Status}}" app2-frontend 2>/dev/null || echo "unknown")
            echo "Backend: $BACKEND_HEALTH, Frontend: $FRONTEND_HEALTH (attempt $((TRIES+1))/$MAX_TRIES)"
            if [ "$BACKEND_HEALTH" = "healthy" ] && [ "$FRONTEND_HEALTH" = "healthy" ]; then
              echo "✅ Both containers healthy!"
              break
            fi
            TRIES=$((TRIES+1))
            sleep 5
          done

          # Final verification - check containers are running (even if health not yet reported)
          if docker ps | grep -q "app2-backend" && docker ps | grep -q "app2-frontend"; then
            echo "✅ App2 deployment successful!"

            # Show final status ensuring both apps are independent
            echo "📊 Current application status:"
            docker ps --format "table {{.Names}}\t{{.Status}}" | grep -E "(app2|app2)" || echo "No app containers found"

            # Clean up old app2 images after successful deployment
            echo "🧹 Cleaning up old app2 images..."
            docker images | grep -E "mhylle/mhylle-app2" | grep -v "$VERSION" | awk '{print $3}' | xargs -r docker rmi -f 2>/dev/null || echo "No old app2 images to remove"

            # Final disk usage report
            echo "📊 Disk usage after cleanup:"
            df -h / || true
            docker system df || true

          else
            echo "❌ App2 deployment failed!"
            docker ps | grep app2 || echo "No app2 containers found"
            docker logs app2-backend --tail=10 2>/dev/null || echo "No backend logs"
            docker logs app2-frontend --tail=10 2>/dev/null || echo "No frontend logs"
            exit 1
          fi

    - name: Verify deployment
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          echo "🔍 Verifying deployment and app independence..."
          
          # Wait for services to be ready
          sleep 30
          
          # Check if app2 containers are running
          if docker ps | grep -E "app2-(frontend|backend)"; then
            echo "✅ App2 containers are running"
          else
            echo "❌ App2 containers not found"
            exit 1
          fi
          
          # CRITICAL: Verify app2 is still running (independence check)
          if docker ps | grep -E "app2-(frontend|backend)"; then
            echo "✅ App2 containers are still running (independence verified)"
          else
            echo "⚠️ App2 containers not found - checking if this is expected"
            # Don't fail deployment if app2 was never deployed, but warn
          fi
          
          # Show current status of all apps
          echo "📊 Current application status:"
          docker ps --format "table {{.Names}}\t{{.Status}}" | grep -E "(app2|app2)" || echo "No application containers found"
          
          # Test health endpoint
          if curl -f -s "https://mhylle.com/health/${{ env.APP_NAME }}" > /dev/null; then
            echo "✅ Health check passed"
          else
            echo "⚠️  Health check failed, but deployment may still be successful"
          fi
          
          # Test main application
          if curl -f -s "https://mhylle.com/${{ env.APP_NAME }}" > /dev/null; then
            echo "✅ Application is accessible"
          else
            echo "⚠️  Application accessibility test failed"
          fi

  notify:
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: always()

    steps:
    - name: Notify deployment status
      run: |
        if [[ "${{ needs.deploy.result }}" == "success" ]]; then
          echo "🎉 Deployment successful!"
          echo "Application: https://mhylle.com/${{ env.APP_NAME }}"
          echo "API: https://mhylle.com/api/${{ env.APP_NAME }}"
          echo "Version: ${{ needs.build.outputs.version }}"
        elif [[ "${{ needs.deploy.result }}" == "failure" ]]; then
          echo "💥 Deployment failed!"
          echo "Check the deployment logs for details."
          exit 1
        elif [[ "${{ needs.deploy.result }}" == "skipped" ]]; then
          echo "⏭️ Deployment skipped (not main branch)"
        else
          echo "❓ Deployment status unknown: ${{ needs.deploy.result }}"
        fi
