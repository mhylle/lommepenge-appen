version: '3.8'

services:
  # PostgreSQL Database - Local development instance
  postgres:
    image: postgres:15-alpine
    container_name: mhylle-postgres-dev
    environment:
      POSTGRES_DB: mhylle_main
      POSTGRES_USER: mhylle_user
      POSTGRES_PASSWORD: mhylle_secure_pass_2024
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./scripts/init-app2-db.sql:/docker-entrypoint-initdb.d/init-app2-db.sql:ro
    networks:
      - app2-dev-network
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mhylle_user -d mhylle_main"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # App2 Backend - NestJS with all Lommepenge API endpoints
  app2-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: app2-backend-dev
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DB_HOST=mhylle-postgres-dev
      - DB_PORT=5432
      - DB_NAME=app2_db
      - DB_USER=app2_user
      - DB_PASSWORD=app2_secure_password
      - JWT_SECRET=app2_jwt_secret_mhylle_2024_secure_token
      - JWT_EXPIRATION=7d
    volumes:
      - ./backend/src:/app/src:ro
      - ./backend/package.json:/app/package.json:ro
      - ./backend/package-lock.json:/app/package-lock.json:ro
      - ./backend/tsconfig.json:/app/tsconfig.json:ro
      - ./backend/nest-cli.json:/app/nest-cli.json:ro
    ports:
      - "3000:3000"
    networks:
      - app2-dev-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    restart: unless-stopped
    command: npm run start:dev

  # App2 Frontend - Angular with Lommepenge UI
  app2-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: app2-frontend-dev
    environment:
      - NODE_ENV=development
      - API_URL=http://app2-backend-dev:3000
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/angular.json:/app/angular.json:ro
      - ./frontend/package.json:/app/package.json:ro
      - ./frontend/package-lock.json:/app/package-lock.json:ro
      - ./frontend/tsconfig.json:/app/tsconfig.json:ro
      - ./frontend/proxy.conf.json:/app/proxy.conf.json:ro
    ports:
      - "4200:4200"
    networks:
      - app2-dev-network
    depends_on:
      - app2-backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    command: npm run start -- --host 0.0.0.0 --port 4200 --proxy-config proxy.conf.json

networks:
  app2-dev-network:
    driver: bridge
    name: app2-dev-network

volumes:
  postgres_dev_data:
    driver: local