version: '3.8'

services:
  lommepenge-frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/mhylle/lommepenge-appen-frontend}:${IMAGE_TAG:-latest}
    container_name: lommepenge-frontend
    restart: unless-stopped
    ports:
      - "3002:80"
    environment:
      - NODE_ENV=production
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "traefik.enable=true"
      - "app.name=lommepenge"
      - "app.type=frontend"
    networks:
      - lommepenge-network
      - mhylle-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  lommepenge-backend:
    image: ${BACKEND_IMAGE:-ghcr.io/mhylle/lommepenge-appen-backend}:${IMAGE_TAG:-latest}
    container_name: lommepenge-backend
    restart: unless-stopped
    ports:
      - "8002:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=mhylle-postgres
      - DB_PORT=5432
      - DB_NAME=mhylle_app2
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - JWT_SECRET=${JWT_SECRET:-default_jwt_secret}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-7d}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "traefik.enable=true"
      - "app.name=lommepenge"
      - "app.type=backend"
    networks:
      - lommepenge-network
      - mhylle-network
    depends_on:
      - mhylle-postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/lommepenge/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  lommepenge-network:
    driver: bridge
    name: lommepenge-network
    labels:
      - "app.name=lommepenge"
  mhylle-network:
    external: true
    name: mhylle-network

# Note: PostgreSQL is provided by the main infrastructure
# This compose file only defines the application-specific services
