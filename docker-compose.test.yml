version: '3.8'

services:
  lommepenge-frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: lommepenge-frontend-test
    restart: unless-stopped
    ports:
      - "3003:80"
    environment:
      - NODE_ENV=production
    networks:
      - lommepenge-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  lommepenge-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: lommepenge-backend-test
    restart: unless-stopped
    ports:
      - "8003:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=test_jwt_secret_lommepenge
      - JWT_EXPIRATION=7d
    volumes:
      - sqlite_data:/app/data
    networks:
      - lommepenge-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

networks:
  lommepenge-network:
    driver: bridge
    name: lommepenge-test-network

volumes:
  sqlite_data:
    driver: local
