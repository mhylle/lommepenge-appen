<h2 mat-dialog-title class="credentials-title">
  <span class="title-icon">{{ data.isReset ? '🔑' : '🎉' }}</span>
  {{ getTitle() }}
</h2>

<mat-dialog-content class="credentials-content">
  <p class="credentials-intro" *ngIf="!data.isReset">
    Her er login-oplysningerne til {{ data.childName }}'s konto:
  </p>
  <p class="credentials-intro" *ngIf="data.isReset">
    Her er den nye PIN-kode til {{ data.childName }}'s konto:
  </p>

  <!-- Username field -->
  <div class="credential-field">
    <label class="credential-label">Brugernavn:</label>
    <div class="credential-value-row">
      <span class="credential-value">{{ data.username }}</span>
      <button class="copy-button" (click)="copyUsername()" title="Kopier brugernavn">
        📋 Kopier
      </button>
    </div>
  </div>

  <!-- PIN field -->
  <div class="credential-field pin-field">
    <label class="credential-label">PIN-kode:</label>
    <div class="credential-value-row">
      <span class="credential-value pin-value">{{ data.pin }}</span>
      <button class="copy-button" (click)="copyPin()" title="Kopier PIN-kode">
        📋 Kopier
      </button>
    </div>
  </div>

  <!-- Warning message -->
  <div class="warning-box">
    <span class="warning-icon">⚠️</span>
    <p class="warning-text">
      Gem disse oplysninger et sikkert sted. PIN-koden kan ikke vises igen!
    </p>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="center">
  <button class="save-button" (click)="close()">
    ✅ OK, jeg har gemt det
  </button>
</mat-dialog-actions>
